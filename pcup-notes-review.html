<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCup Notes Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ── PCUP BRAND TOKENS ───────────────────────────────────────
     Steel #a5b8d4 = page background.
     Deep navy #243859 = card background.
     White / off-white text on navy. Deep navy text on steel.
     Gold #ecbf3e for accents on dark surfaces. Gold #8a6810 for
     accents that sit on light steel (better contrast).
     Red, green, amber kept for status pills.
  */
  :root {
    --steel:        #a5b8d4;
    --steel-deep:   #8ba2c4;
    --navy:         #243859;
    --navy-soft:    #2e4570;
    --navy-line:    #3a5380;
    --paper:        #ffffff;
    --paper-soft:   #f3f6fb;
    --paper-line:   #c9d5e6;
    --ink-on-steel: #0F2A56;
    --ink-on-navy:  #f3f6fb;
    --dim-on-navy:  #b8c5dd;
    --dim-on-steel: #3a5070;
    --gold-dark:    #ecbf3e;
    --gold-light:   #8a6810;
    --green:        #38a16a;
    --green-bg:     rgba(56,161,106,.16);
    --amber:        #d49a1d;
    --amber-bg:     rgba(212,154,29,.18);
    --red:          #c0392b;
    --red-bg:       rgba(192,57,43,.16);
    --blue:         #2c6db5;
    --blue-bg:      rgba(44,109,181,.16);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--steel);
    color: var(--ink-on-steel);
    font-family: "Barlow", -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  /* ── HEADER ────────────────────────────────────────────────── */
  .topbar {
    background: var(--navy);
    color: var(--ink-on-navy);
    padding: 18px 22px 16px;
    border-bottom: 4px solid var(--gold-dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .brand {
    display: flex; align-items: center; gap: 14px;
  }
  .brand-mark {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--gold-dark); color: var(--navy);
    display: flex; align-items: center; justify-content: center;
    font-family: "Barlow Condensed", sans-serif;
    font-weight: 900; font-size: 22px;
    letter-spacing: .02em;
  }
  .brand-text { line-height: 1.1; }
  .brand-title {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 26px; font-weight: 900;
    color: var(--ink-on-navy);
    letter-spacing: .03em; text-transform: uppercase;
  }
  .brand-sub {
    font-size: 12px; font-weight: 600;
    color: var(--gold-dark);
    letter-spacing: .14em; text-transform: uppercase;
    margin-top: 2px;
  }
  .who {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--dim-on-navy);
  }
  .who input {
    background: var(--navy-soft);
    color: var(--ink-on-navy);
    border: 1.5px solid var(--navy-line);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: "Barlow", sans-serif;
    font-size: 14px; font-weight: 600;
    min-width: 180px;
  }
  .who input::placeholder { color: var(--dim-on-navy); opacity: .55; }
  .who input:focus { outline: none; border-color: var(--gold-dark); }

  /* ── SETUP BANNER ──────────────────────────────────────────── */
  .setup {
    background: var(--paper);
    color: var(--ink-on-steel);
    border-bottom: 1px solid var(--paper-line);
    padding: 14px 22px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .setup-label {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 14px; font-weight: 800;
    color: var(--gold-light);
    letter-spacing: .12em; text-transform: uppercase;
  }
  .setup input {
    flex: 1; min-width: 280px;
    background: var(--paper-soft);
    color: var(--ink-on-steel);
    border: 1.5px solid var(--paper-line);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: "Barlow", sans-serif;
    font-size: 13px; font-weight: 600;
  }
  .setup input:focus { outline: none; border-color: var(--gold-light); }
  .setup-hint { font-size: 12px; color: var(--dim-on-steel); }

  /* ── CONTROLS ROW ──────────────────────────────────────────── */
  .controls {
    padding: 16px 22px;
    display: flex; gap: 12px; flex-wrap: wrap;
    align-items: flex-end;
  }
  .ctrl { display: flex; flex-direction: column; gap: 6px; }
  .ctrl label {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 12px; font-weight: 800;
    color: var(--ink-on-steel);
    letter-spacing: .12em; text-transform: uppercase;
  }
  .ctrl input, .ctrl select {
    background: var(--paper);
    color: var(--ink-on-steel);
    border: 1.5px solid var(--paper-line);
    border-radius: 8px;
    padding: 9px 12px;
    font-family: "Barlow", sans-serif;
    font-size: 14px; font-weight: 600;
    min-width: 140px;
  }
  .ctrl input:focus, .ctrl select:focus { outline: none; border-color: var(--navy); }
  .btn {
    height: 40px; padding: 0 18px;
    background: var(--navy); color: var(--ink-on-navy);
    border: none; border-radius: 8px;
    font-family: "Barlow Condensed", sans-serif;
    font-size: 16px; font-weight: 900;
    letter-spacing: .06em; text-transform: uppercase;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .btn:hover { background: var(--navy-soft); }
  .btn:active { transform: scale(.97); }
  .btn-gold {
    background: var(--gold-dark); color: var(--navy);
  }
  .btn-gold:hover { background: #d4a832; }
  .btn-ghost {
    background: transparent; color: var(--ink-on-steel);
    border: 1.5px solid var(--navy);
  }
  .btn-ghost:hover { background: var(--paper); }

  /* ── STATUS BAR ────────────────────────────────────────────── */
  .statusbar {
    padding: 10px 22px;
    background: var(--paper-soft);
    border-top: 1px solid var(--paper-line);
    border-bottom: 1px solid var(--paper-line);
    color: var(--dim-on-steel);
    font-size: 13px;
    display: flex; gap: 18px; flex-wrap: wrap;
  }
  .statusbar strong { color: var(--ink-on-steel); font-weight: 800; }
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 999px;
    font-size: 12px; font-weight: 700;
    font-family: "Barlow Condensed", sans-serif;
    letter-spacing: .08em; text-transform: uppercase;
  }
  .pill-pending  { background: var(--amber-bg); color: var(--amber); }
  .pill-approved { background: var(--green-bg); color: var(--green); }
  .pill-edited   { background: var(--blue-bg);  color: var(--blue); }
  .pill-rejected { background: var(--red-bg);   color: var(--red); }
  .pill-cleaned  { background: var(--blue-bg);  color: var(--blue); }

  /* ── NOTES GRID ────────────────────────────────────────────── */
  .grid {
    padding: 22px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--navy);
    color: var(--ink-on-navy);
    border-radius: 12px;
    padding: 16px 18px 14px;
    border: 1px solid var(--navy-line);
    box-shadow: 0 2px 8px rgba(15, 42, 86, .15);
    display: flex; flex-direction: column;
    gap: 12px;
  }
  .card-hd {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 10px; flex-wrap: wrap;
  }
  .card-hd-l { display: flex; flex-direction: column; gap: 3px; }
  .ref-name {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 22px; font-weight: 900;
    color: var(--ink-on-navy);
    letter-spacing: .02em; line-height: 1.05;
  }
  .ref-meta {
    font-size: 12px; color: var(--dim-on-navy);
    font-weight: 600;
  }
  .card-hd-r { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
  .coach-line {
    font-size: 11px; color: var(--gold-dark);
    font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    text-align: right; line-height: 1.2;
  }

  .ratings {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px 14px;
    background: var(--navy-soft);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .rating-cell {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--dim-on-navy);
  }
  .rating-cell span:last-child {
    color: var(--gold-dark); font-weight: 800;
    font-family: "Barlow Condensed", sans-serif;
    font-size: 16px;
  }
  .extras {
    display: flex; flex-wrap: wrap; gap: 6px;
    font-size: 11px; font-weight: 700;
  }
  .extra-tag {
    background: var(--navy-soft); color: var(--dim-on-navy);
    padding: 3px 8px; border-radius: 6px;
    font-family: "Barlow Condensed", sans-serif;
    letter-spacing: .08em; text-transform: uppercase;
  }
  .extra-tag.finals { background: var(--gold-dark); color: var(--navy); }
  .extra-tag.flag   { background: var(--red-bg); color: #ff8a7a; border: 1px solid rgba(255,138,122,.3); }

  .notes-block {
    display: flex; flex-direction: column; gap: 6px;
  }
  .notes-label {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 11px; font-weight: 800;
    color: var(--gold-dark);
    letter-spacing: .14em; text-transform: uppercase;
  }
  .notes-label.priv { color: #f2b56b; }
  .notes-text {
    background: var(--navy-soft);
    color: var(--ink-on-navy);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    border: 1px solid var(--navy-line);
  }
  .notes-text.priv { border-color: rgba(212, 154, 29, .4); background: rgba(212, 154, 29, .08); }
  .notes-edit {
    width: 100%;
    background: var(--paper);
    color: var(--ink-on-steel);
    border: 2px solid var(--gold-dark);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: "Barlow", sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 90px;
    resize: vertical;
  }
  .notes-edit:focus { outline: none; border-color: #d4a832; }
  .final-banner {
    background: var(--green-bg);
    border: 1px solid rgba(56,161,106,.5);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    color: #7fdba8;
    display: flex; align-items: center; gap: 8px;
  }
  .final-banner strong { color: var(--green); }

  .actions {
    display: flex; gap: 8px; flex-wrap: wrap;
    border-top: 1px solid var(--navy-line);
    padding-top: 12px;
  }
  .act-btn {
    flex: 1; min-width: 80px;
    height: 36px; padding: 0 12px;
    border: none; border-radius: 7px;
    font-family: "Barlow Condensed", sans-serif;
    font-size: 13px; font-weight: 800;
    letter-spacing: .08em; text-transform: uppercase;
    cursor: pointer;
    transition: opacity .12s, transform .1s;
    display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  }
  .act-btn:active { transform: scale(.96); }
  .act-btn:hover { opacity: .9; }
  .act-edit    { background: var(--gold-dark); color: var(--navy); }
  .act-approve { background: var(--green); color: #fff; }
  .act-reject  { background: var(--red); color: #fff; }
  .act-save    { background: var(--blue); color: #fff; }
  .act-cancel  { background: var(--navy-soft); color: var(--ink-on-navy); border: 1px solid var(--navy-line); }
  .act-restore { background: transparent; color: var(--dim-on-navy); border: 1px solid var(--navy-line); }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--dim-on-steel);
    font-size: 16px;
  }
  .empty-mark {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 56px; font-weight: 900;
    color: var(--steel-deep);
    margin-bottom: 10px;
  }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--navy); color: var(--ink-on-navy);
    padding: 12px 18px; border-radius: 10px;
    border-left: 4px solid var(--gold-dark);
    font-size: 14px; font-weight: 600;
    box-shadow: 0 6px 24px rgba(0,0,0,.2);
    transform: translateY(100px); opacity: 0;
    transition: transform .2s, opacity .2s;
    z-index: 100;
    max-width: 420px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.err  { border-left-color: var(--red); }
  .toast.ok   { border-left-color: var(--green); }

  .footer {
    padding: 24px 22px 40px;
    text-align: center;
    color: var(--dim-on-steel);
    font-size: 12px;
  }
  .footer a { color: var(--ink-on-steel); font-weight: 700; }

  @media (max-width: 640px) {
    .grid { padding: 14px; grid-template-columns: 1fr; gap: 12px; }
    .topbar { padding: 14px 16px; }
    .brand-title { font-size: 22px; }
    .controls { padding: 12px 16px; }
    .statusbar { padding: 10px 16px; }
    .setup { padding: 12px 16px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-mark">PC</div>
    <div class="brand-text">
      <div class="brand-title">Notes Review</div>
      <div class="brand-sub">Presidents Cup 2026 . NW Qualifier</div>
    </div>
  </div>
  <div class="who">
    <span>Reviewer:</span>
    <input id="reviewer-name" placeholder="Your name" autocomplete="off">
  </div>
</header>

<div class="setup">
  <span class="setup-label">Apps Script URL</span>
  <input id="api-url" placeholder="https://script.google.com/macros/s/AKfy.../exec" autocomplete="off">
  <span class="setup-hint" id="setup-hint">Paste once, saved locally.</span>
</div>

<div class="controls">
  <div class="ctrl">
    <label for="filter-date-from">From</label>
    <input type="date" id="filter-date-from">
  </div>
  <div class="ctrl">
    <label for="filter-date-to">To</label>
    <input type="date" id="filter-date-to">
  </div>
  <div class="ctrl">
    <label for="filter-status">Status</label>
    <select id="filter-status">
      <option value="">All (excludes rejected)</option>
      <option value="pending">Pending</option>
      <option value="approved">Approved</option>
      <option value="edited">Edited</option>
      <option value="rejected">Rejected</option>
    </select>
  </div>
  <div class="ctrl">
    <label for="filter-ref">Referee</label>
    <input type="text" id="filter-ref" placeholder="any" autocomplete="off">
  </div>
  <button class="btn btn-gold" onclick="loadNotes()">Load</button>
  <button class="btn btn-ghost" onclick="resetFilters()">Reset</button>
</div>

<div class="statusbar" id="statusbar">
  <span>Showing <strong id="count-shown">0</strong> notes</span>
  <span><span class="pill pill-pending">Pending</span> <strong id="count-pending">0</strong></span>
  <span><span class="pill pill-approved">Approved</span> <strong id="count-approved">0</strong></span>
  <span><span class="pill pill-edited">Edited</span> <strong id="count-edited">0</strong></span>
  <span><span class="pill pill-rejected">Rejected</span> <strong id="count-rejected">0</strong></span>
</div>

<main class="grid" id="grid">
  <div class="empty">
    <div class="empty-mark">~</div>
    <div>Set your Apps Script URL above, then click Load.</div>
  </div>
</main>

<div class="footer">
  Presidents Cup 2026 . Powered by JAReferee
</div>

<div class="toast" id="toast"></div>

<script>
  // ── localStorage keys
  const LS_API = "pcup_apps_script_url";
  const LS_REV = "pcup_reviewer_name";

  let allNotes = [];
  let editingRowNum = null;

  // ── INIT
  document.addEventListener("DOMContentLoaded", function () {
    const url = localStorage.getItem(LS_API) || "";
    const rev = localStorage.getItem(LS_REV) || "";
    document.getElementById("api-url").value = url;
    document.getElementById("reviewer-name").value = rev;
    if (url) { document.getElementById("setup-hint").textContent = "Saved. Edit to change."; }
    document.getElementById("api-url").addEventListener("change", function (e) {
      localStorage.setItem(LS_API, e.target.value.trim());
      document.getElementById("setup-hint").textContent = "Saved.";
    });
    document.getElementById("reviewer-name").addEventListener("change", function (e) {
      localStorage.setItem(LS_REV, e.target.value.trim());
    });
  });

  function getApiUrl() {
    return (document.getElementById("api-url").value || "").trim();
  }
  function getReviewer() {
    return (document.getElementById("reviewer-name").value || "").trim();
  }

  // ── TOAST
  function toast(msg, kind) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast show " + (kind || "");
    clearTimeout(t._timer);
    t._timer = setTimeout(function () { t.className = "toast"; }, 3200);
  }

  // ── FILTERS
  function resetFilters() {
    document.getElementById("filter-date-from").value = "";
    document.getElementById("filter-date-to").value = "";
    document.getElementById("filter-status").value = "";
    document.getElementById("filter-ref").value = "";
    loadNotes();
  }

  // ── LOAD
  async function loadNotes() {
    const url = getApiUrl();
    if (!url) { toast("Set the Apps Script URL first.", "err"); return; }
    const params = new URLSearchParams({ action: "pendingNotes" });
    const df = document.getElementById("filter-date-from").value;
    const dt = document.getElementById("filter-date-to").value;
    const st = document.getElementById("filter-status").value;
    const rf = document.getElementById("filter-ref").value;
    if (df) params.set("dateFrom", df);
    if (dt) params.set("dateTo",   dt);
    if (st) params.set("status",   st);
    if (rf) params.set("refName",  rf);
    const grid = document.getElementById("grid");
    grid.innerHTML = '<div class="empty"><div class="empty-mark">.</div>Loading.</div>';
    try {
      const r = await fetch(url + "?" + params.toString());
      const j = await r.json();
      if (j.status !== "ok") { throw new Error(j.message || "Server error"); }
      allNotes = j.data.rows || [];
      renderAll();
    } catch (e) {
      toast("Load failed: " + e.message, "err");
      grid.innerHTML = '<div class="empty"><div class="empty-mark">!</div>' + escapeHtml(e.message) + "</div>";
    }
  }

  function renderAll() {
    const grid = document.getElementById("grid");
    const counts = { pending: 0, approved: 0, edited: 0, rejected: 0, cleaned: 0 };
    allNotes.forEach(function (n) {
      const s = (n.cleanupStatus || "pending").toLowerCase();
      if (counts[s] != null) counts[s]++;
    });
    document.getElementById("count-shown").textContent    = allNotes.length;
    document.getElementById("count-pending").textContent  = counts.pending;
    document.getElementById("count-approved").textContent = counts.approved;
    document.getElementById("count-edited").textContent   = counts.edited;
    document.getElementById("count-rejected").textContent = counts.rejected;
    if (!allNotes.length) {
      grid.innerHTML = '<div class="empty"><div class="empty-mark">~</div>No notes match the current filters.</div>';
      return;
    }
    grid.innerHTML = "";
    allNotes.forEach(function (n) { grid.appendChild(renderCard(n)); });
  }

  function renderCard(n) {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.rowNum = n.rowNum;
    const status = (n.cleanupStatus || "pending").toLowerCase();
    const isEditing = (editingRowNum === n.rowNum);
    const displayText = (status === "edited" || status === "approved") && n.finalNote ? n.finalNote : n.pubNotes;

    // header
    const hd = document.createElement("div"); hd.className = "card-hd";
    const hdL = document.createElement("div"); hdL.className = "card-hd-l";
    hdL.innerHTML =
      '<div class="ref-name">' + escapeHtml(n.refName || "-") + '</div>' +
      '<div class="ref-meta">' + escapeHtml(n.date) + " . F" + escapeHtml(String(n.field)) +
      " . " + escapeHtml(n.kickoffTime) + " . " + escapeHtml(n.ageGroup) +
      (n.officialRole ? " . " + escapeHtml(n.officialRole) : "") + "</div>";
    const hdR = document.createElement("div"); hdR.className = "card-hd-r";
    hdR.innerHTML =
      '<span class="pill pill-' + escapeHtml(status) + '">' + escapeHtml(status) + '</span>' +
      '<div class="coach-line">' + escapeHtml(n.coachName || "?") +
      (n.coachRole ? " . " + escapeHtml(n.coachRole) : "") + "</div>";
    hd.appendChild(hdL); hd.appendChild(hdR);
    card.appendChild(hd);

    // ratings (only for full feedback)
    if (n.type === "Full Feedback" && (n.matchControl || n.interaction || n.teamwork || n.positioning)) {
      const ratings = document.createElement("div"); ratings.className = "ratings";
      ratings.innerHTML =
        '<div class="rating-cell"><span>Match Ctl</span><span>' + escapeHtml(String(n.matchControl || "-")) + '</span></div>' +
        '<div class="rating-cell"><span>Interaction</span><span>' + escapeHtml(String(n.interaction || "-")) + '</span></div>' +
        '<div class="rating-cell"><span>Teamwork</span><span>' + escapeHtml(String(n.teamwork || "-")) + '</span></div>' +
        '<div class="rating-cell"><span>Positioning</span><span>' + escapeHtml(String(n.positioning || "-")) + '</span></div>';
      card.appendChild(ratings);
    }

    // extras (difficulty, finals, flags, type)
    const extras = document.createElement("div"); extras.className = "extras";
    let xs = "";
    xs += '<span class="extra-tag">' + escapeHtml(n.type || "Note") + '</span>';
    if (n.difficulty) xs += '<span class="extra-tag">Diff ' + escapeHtml(String(n.difficulty)) + '</span>';
    if (String(n.recFinals || "").toLowerCase() === "yes")
      xs += '<span class="extra-tag finals">★ Finals</span>';
    if (n.flags) xs += '<span class="extra-tag flag">' + escapeHtml(n.flags) + '</span>';
    extras.innerHTML = xs;
    card.appendChild(extras);

    // public notes block
    const pubBlock = document.createElement("div"); pubBlock.className = "notes-block";
    if (isEditing) {
      pubBlock.innerHTML =
        '<div class="notes-label">Edit Public Note (saved as Final Note)</div>' +
        '<textarea class="notes-edit" data-edit="' + n.rowNum + '">' +
        escapeHtml(displayText || "") + "</textarea>";
    } else {
      const labelTxt =
        (status === "edited"   && n.finalNote) ? "Final Note (edited)" :
        (status === "approved" && n.finalNote) ? "Final Note (approved)" :
        (status === "approved")                ? "Public Note (approved as-is)" :
        "Public Note";
      pubBlock.innerHTML =
        '<div class="notes-label">' + labelTxt + '</div>' +
        '<div class="notes-text">' + escapeHtml(displayText || "(empty)") + "</div>";
    }
    card.appendChild(pubBlock);

    // private notes (read-only, only shown if present)
    if (n.privNotes) {
      const priv = document.createElement("div"); priv.className = "notes-block";
      priv.innerHTML =
        '<div class="notes-label priv">Private Note (coach only, never sent)</div>' +
        '<div class="notes-text priv">' + escapeHtml(n.privNotes) + "</div>";
      card.appendChild(priv);
    }

    // reviewer attribution if present
    if (n.reviewedBy) {
      const fb = document.createElement("div"); fb.className = "final-banner";
      fb.innerHTML = '<strong>Reviewed by:</strong> ' + escapeHtml(n.reviewedBy);
      card.appendChild(fb);
    }

    // actions
    const actions = document.createElement("div"); actions.className = "actions";
    if (isEditing) {
      actions.innerHTML =
        '<button class="act-btn act-save"   onclick="saveEdit('   + n.rowNum + ')">Save</button>' +
        '<button class="act-btn act-cancel" onclick="cancelEdit(' + n.rowNum + ')">Cancel</button>';
    } else if (status === "rejected") {
      actions.innerHTML =
        '<button class="act-btn act-restore" onclick="restoreNote('  + n.rowNum + ')">Restore</button>';
    } else {
      actions.innerHTML =
        '<button class="act-btn act-edit"    onclick="beginEdit('    + n.rowNum + ')">Edit</button>' +
        '<button class="act-btn act-approve" onclick="approveNote('  + n.rowNum + ')">Approve</button>' +
        '<button class="act-btn act-reject"  onclick="rejectNote('   + n.rowNum + ')">Reject</button>';
    }
    card.appendChild(actions);

    return card;
  }

  // ── ACTIONS
  function beginEdit(rowNum) {
    editingRowNum = rowNum;
    renderAll();
  }
  function cancelEdit(rowNum) {
    editingRowNum = null;
    renderAll();
  }
  async function saveEdit(rowNum) {
    const ta = document.querySelector('textarea[data-edit="' + rowNum + '"]');
    if (!ta) return;
    const newText = ta.value;
    await postStatus(rowNum, "edited", newText);
  }
  async function approveNote(rowNum) {
    const n = allNotes.find(function (x) { return x.rowNum === rowNum; });
    if (!n) return;
    const finalNote = n.finalNote || n.pubNotes || "";
    await postStatus(rowNum, "approved", finalNote);
  }
  async function rejectNote(rowNum) {
    await postStatus(rowNum, "rejected", null);
  }
  async function restoreNote(rowNum) {
    await postStatus(rowNum, "pending", null);
  }

  async function postStatus(rowNum, status, finalNote) {
    const url = getApiUrl();
    if (!url) { toast("Set the Apps Script URL first.", "err"); return; }
    const reviewer = getReviewer();
    if (!reviewer) { toast("Enter your reviewer name first.", "err"); return; }
    const body = { action: "updateNoteStatus", rowNum: rowNum, status: status, reviewedBy: reviewer };
    if (finalNote != null) body.finalNote = finalNote;
    try {
      const r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(body)
      });
      const j = await r.json();
      if (j.status !== "ok") { throw new Error(j.message || "Server error"); }
      // update local state
      const n = allNotes.find(function (x) { return x.rowNum === rowNum; });
      if (n) {
        n.cleanupStatus = status;
        if (finalNote != null) n.finalNote = finalNote;
        n.reviewedBy = reviewer;
      }
      editingRowNum = null;
      renderAll();
      toast(status.charAt(0).toUpperCase() + status.slice(1) + " saved.", "ok");
    } catch (e) {
      toast("Save failed: " + e.message, "err");
    }
  }

  // ── UTIL
  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
</script>
</body>
</html>
