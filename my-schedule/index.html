<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>My Schedule · 2026 USYS Presidents Cup NW</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --steel:       #a5b8d4;
  --navy:        #0F2A56;
  --navy-mid:    #1c3d70;
  --navy-panel:  #243859;
  --red:         #D52B3B;
  --red-bri:     #e63946;
  --gold:        #d4a017;
  --gold-bri:    #ecbf3e;
  --gold-dark:   #8a6810;
  --blue:        #4d7ad9;
  --blue-bri:    #6b95e6;
  --green:       #16a34a;
  --green-bri:   #22c55e;
  --bebas:       'Barlow Condensed', sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Barlow', sans-serif;
  background: var(--steel);
  color: var(--navy);
  min-height: 100vh;
}
body.dark {
  background: #0a1628;
  color: #fff;
  --navy: #fff;
  --navy-panel: #182842;
}

/* ── Header ── */
.header {
  background: var(--navy);
  color: #fff;
  padding: 14px 16px;
  position: sticky; top: 0; z-index: 10;
  border-bottom: 3px solid var(--red);
  display: flex; align-items: center; gap: 12px;
}
.back-link {
  color: rgba(255,255,255,.7);
  text-decoration: none;
  font-family: var(--bebas);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.back-link:hover { color: var(--gold-bri); }
.header-title {
  font-family: var(--bebas);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: .06em;
  text-transform: uppercase;
  flex: 1;
}
.theme-toggle {
  background: rgba(255,255,255,.1);
  border: 0;
  border-radius: 999px;
  width: 36px; height: 36px;
  color: #fff;
  cursor: pointer;
  font-size: 16px;
}

.wrap {
  max-width: 640px;
  margin: 0 auto;
  padding: 20px 16px 60px;
}

/* ── Name search card ── */
.search-card {
  background: rgba(255,255,255,.4);
  border: 2px solid rgba(15,42,86,.15);
  border-radius: 16px;
  padding: 22px 20px;
  margin-bottom: 24px;
  position: relative;
}
body.dark .search-card {
  background: rgba(255,255,255,.06);
  border-color: rgba(255,255,255,.12);
}
.search-card-label {
  font-family: var(--bebas);
  font-size: 13px;
  letter-spacing: .12em;
  font-weight: 800;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 10px;
}
.name-input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid rgba(15,42,86,.2);
  border-radius: 10px;
  font-family: 'Barlow', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--navy);
  background: rgba(255,255,255,.9);
  outline: none;
  transition: border-color .15s;
}
body.dark .name-input {
  background: rgba(255,255,255,.08);
  color: #fff;
  border-color: rgba(255,255,255,.18);
}
.name-input:focus { border-color: var(--gold-bri); }
.name-input::placeholder { color: #8094b5; font-weight: 500; }

/* Autocomplete dropdown */
.autocomplete {
  position: absolute;
  left: 20px; right: 20px;
  top: 100%;
  margin-top: 6px;
  background: #fff;
  border: 1px solid rgba(15,42,86,.18);
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(15,42,86,.18);
  max-height: 280px;
  overflow-y: auto;
  z-index: 5;
  display: none;
}
body.dark .autocomplete {
  background: #1c3d70;
  border-color: rgba(255,255,255,.15);
}
.autocomplete.show { display: block; }
.ac-item {
  padding: 11px 14px;
  cursor: pointer;
  color: var(--navy);
  font-size: 15px;
  font-weight: 600;
  border-bottom: 1px solid rgba(15,42,86,.06);
}
body.dark .ac-item { color: #fff; border-bottom-color: rgba(255,255,255,.08); }
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.active { background: rgba(108,149,230,.18); }
.ac-empty {
  padding: 14px;
  color: #6b7d97;
  font-style: italic;
  font-size: 14px;
}

/* Status/help text */
.search-help {
  margin-top: 10px;
  font-size: 13px;
  color: #4a5d80;
  font-weight: 500;
}
body.dark .search-help { color: #a3b4cf; }

/* Welcome bar (shown after match) */
.welcome-bar {
  background: var(--navy-panel);
  color: #fff;
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 20px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  border-top: 3px solid var(--gold-bri);
}
.welcome-bar-name {
  font-family: var(--bebas);
  font-size: 22px;
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.welcome-bar-sub {
  font-size: 12px;
  color: rgba(255,255,255,.7);
  margin-top: 2px;
}
.switch-link {
  font-family: var(--bebas);
  font-size: 11px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--gold-bri);
  background: none;
  border: 0;
  cursor: pointer;
  font-weight: 800;
  text-decoration: underline;
}

/* ── Day section ── */
.day-section { margin-bottom: 26px; }
.day-section-title {
  font-family: var(--bebas);
  font-size: 14px;
  font-weight: 800;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--red);
  margin-bottom: 10px;
  padding-left: 4px;
}
.day-section.today .day-section-title {
  color: var(--green);
}
.day-section-title .count {
  color: rgba(15,42,86,.5);
  font-weight: 700;
  margin-left: 8px;
}
body.dark .day-section-title .count { color: rgba(255,255,255,.4); }

/* ── Game card ── */
.game-card {
  background: #fff;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: 0 2px 8px rgba(15,42,86,.08);
  border-left: 4px solid var(--blue);
  cursor: pointer;
  transition: box-shadow .15s, transform .08s;
}
body.dark .game-card { background: #1c3d70; }
.game-card:hover { box-shadow: 0 4px 16px rgba(15,42,86,.14); }
.game-card:active { transform: scale(.99); }
.game-card.today { border-left-color: var(--green); }
.game-card.role-cr   { border-left-color: var(--red-bri); }
.game-card.role-ar1, .game-card.role-ar2 { border-left-color: var(--gold-bri); }
.game-card.role-4th  { border-left-color: var(--blue-bri); }

.game-card-top {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 10px;
  margin-bottom: 6px;
}
.game-time {
  font-family: var(--bebas);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: .03em;
  color: var(--navy);
}
body.dark .game-time { color: #fff; }
.game-role-badge {
  font-family: var(--bebas);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .12em;
  padding: 3px 10px;
  border-radius: 6px;
  text-transform: uppercase;
}
.game-role-badge.role-cr   { background: var(--red-bri); color: #fff; }
.game-role-badge.role-ar1, .game-role-badge.role-ar2 { background: var(--gold-bri); color: var(--navy); }
.game-role-badge.role-4th  { background: var(--blue-bri); color: #fff; }

.game-meta {
  font-size: 13px;
  color: #4a5d80;
  font-weight: 600;
  margin-bottom: 8px;
}
body.dark .game-meta { color: #a3b4cf; }
.game-meta .dot { padding: 0 6px; color: rgba(15,42,86,.3); }
body.dark .game-meta .dot { color: rgba(255,255,255,.3); }
.game-teams {
  font-size: 14px;
  color: var(--navy);
  font-weight: 500;
  line-height: 1.4;
}
body.dark .game-teams { color: rgba(255,255,255,.92); }
.game-teams .vs { color: rgba(15,42,86,.5); font-weight: 700; padding: 0 6px; }
body.dark .game-teams .vs { color: rgba(255,255,255,.4); }

.game-tap-hint {
  margin-top: 8px;
  font-family: var(--bebas);
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--gold-dark);
  font-weight: 700;
}
body.dark .game-tap-hint { color: var(--gold-bri); }

/* ── Expanded crew area ── */
.crew-panel {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid rgba(15,42,86,.1);
}
body.dark .crew-panel { border-top-color: rgba(255,255,255,.12); }
.game-card.expanded .crew-panel { display: block; }
.game-card.expanded .game-tap-hint { display: none; }

.crew-label {
  font-family: var(--bebas);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--gold-dark);
  margin-bottom: 8px;
}
body.dark .crew-label { color: var(--gold-bri); }
.crew-member {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(15,42,86,.06);
}
body.dark .crew-member { border-bottom-color: rgba(255,255,255,.06); }
.crew-member:last-child { border-bottom: none; }
.crew-member-info {
  display: flex; flex-direction: column; gap: 1px;
}
.crew-member-name { font-weight: 700; font-size: 15px; }
.crew-member-role {
  font-family: var(--bebas);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--blue);
}
.crew-call {
  font-family: var(--bebas);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .08em;
  padding: 6px 12px;
  background: var(--green);
  color: #fff;
  border-radius: 6px;
  text-decoration: none;
  text-transform: uppercase;
}
.crew-call:hover { background: var(--green-bri); }
.crew-no-phone {
  font-size: 11px;
  color: rgba(15,42,86,.4);
  font-style: italic;
}
body.dark .crew-no-phone { color: rgba(255,255,255,.4); }

.refcoach-row {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed rgba(15,42,86,.15);
  font-size: 13px;
  color: #4a5d80;
}
body.dark .refcoach-row { color: #a3b4cf; border-top-color: rgba(255,255,255,.15); }
.refcoach-row strong { color: var(--navy); }
body.dark .refcoach-row strong { color: #fff; }

/* ── Empty / loading states ── */
.state-msg {
  text-align: center;
  padding: 40px 20px;
  color: #4a5d80;
}
body.dark .state-msg { color: #a3b4cf; }
.state-msg-icon { font-size: 36px; margin-bottom: 10px; }
.state-msg-title {
  font-family: var(--bebas);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--navy);
  margin-bottom: 6px;
}
body.dark .state-msg-title { color: #fff; }
</style>
</head>
<body>

<header class="header">
  <a class="back-link" href="../index.html">← Portal</a>
  <div class="header-title">My Schedule</div>
  <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">
    <span id="theme-icon">☀️</span>
  </button>
</header>

<div class="wrap">

  <!-- Name search (shown when no ref selected) -->
  <div class="search-card" id="search-card">
    <div class="search-card-label">Who are you?</div>
    <input type="text" id="name-input" class="name-input"
           placeholder="Type your name..." autocomplete="off"
           autocapitalize="words" spellcheck="false">
    <div class="autocomplete" id="autocomplete"></div>
    <div class="search-help" id="search-help">Type a few letters and tap your name. We'll remember you on this device.</div>
  </div>

  <!-- Welcome bar (shown after match) -->
  <div class="welcome-bar" id="welcome-bar" style="display:none;">
    <div>
      <div class="welcome-bar-name" id="welcome-name"></div>
      <div class="welcome-bar-sub" id="welcome-sub"></div>
    </div>
    <button class="switch-link" onclick="switchRef()">Switch ref</button>
  </div>

  <!-- Schedule container -->
  <div id="schedule"></div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqEFEa8IABiKK7Ikxp0k9dsVb_a8-TScA6pwbJTMhpXQKfckL_bEsoDAiEOGM-RLk/exec';
const STORAGE_KEY = 'pcup-my-name';

// ── Theme ──
(function(){
  try { if (localStorage.getItem('pcup-theme') === 'dark') document.body.classList.add('dark'); } catch(e){}
  updateThemeIcon();
})();
function toggleTheme(){
  document.body.classList.toggle('dark');
  try { localStorage.setItem('pcup-theme', document.body.classList.contains('dark') ? 'dark' : 'light'); } catch(e){}
  updateThemeIcon();
}
function updateThemeIcon(){
  const el = document.getElementById('theme-icon');
  if (el) el.textContent = document.body.classList.contains('dark') ? '🌙' : '☀️';
}

function escHtml(s){
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Roster names cache for autocomplete ──
let rosterNames = [];
function loadRosterNames(){
  fetch(SCRIPT_URL + '?action=rosterNames')
    .then(function(r){ return r.json(); })
    .then(function(body){
      if (body && body.status === 'ok' && body.data && Array.isArray(body.data.names)) {
        rosterNames = body.data.names;
      }
    })
    .catch(function(){});
}

// ── Autocomplete ──
const input = document.getElementById('name-input');
const acEl  = document.getElementById('autocomplete');
let acHighlighted = -1;

input.addEventListener('input', function(){
  const q = input.value.trim().toLowerCase();
  if (q.length < 1) { acEl.classList.remove('show'); return; }
  // Match anywhere in name, but rank prefix matches first.
  const prefix = [];
  const contains = [];
  rosterNames.forEach(function(n){
    const nl = n.toLowerCase();
    if (nl.indexOf(q) === 0) prefix.push(n);
    else if (nl.indexOf(q) !== -1) contains.push(n);
  });
  const hits = prefix.concat(contains).slice(0, 12);
  if (!hits.length) {
    acEl.innerHTML = '<div class="ac-empty">No match. Tap enter to try anyway.</div>';
  } else {
    acEl.innerHTML = hits.map(function(n, i){
      return '<div class="ac-item" data-name="' + escHtml(n) + '" onclick="pickRef(\'' + n.replace(/'/g, "\\'") + '\')">' + escHtml(n) + '</div>';
    }).join('');
  }
  acEl.classList.add('show');
  acHighlighted = -1;
});

input.addEventListener('keydown', function(e){
  const items = acEl.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (!items.length) return;
    acHighlighted = (acHighlighted + 1) % items.length;
    updateAcHighlight(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (!items.length) return;
    acHighlighted = (acHighlighted - 1 + items.length) % items.length;
    updateAcHighlight(items);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (acHighlighted >= 0 && items[acHighlighted]) {
      pickRef(items[acHighlighted].dataset.name);
    } else if (input.value.trim()) {
      // Submit typed value as-is; server fuzzy-matcher handles spelling.
      pickRef(input.value.trim());
    }
  } else if (e.key === 'Escape') {
    acEl.classList.remove('show');
  }
});
function updateAcHighlight(items){
  items.forEach(function(el, i){ el.classList.toggle('active', i === acHighlighted); });
}
document.addEventListener('click', function(e){
  if (e.target !== input && !acEl.contains(e.target)) acEl.classList.remove('show');
});

function pickRef(name){
  acEl.classList.remove('show');
  input.value = name;
  loadSchedule(name);
}

function switchRef(){
  try { localStorage.removeItem(STORAGE_KEY); } catch(e){}
  document.getElementById('welcome-bar').style.display = 'none';
  document.getElementById('search-card').style.display = '';
  document.getElementById('schedule').innerHTML = '';
  input.value = '';
  input.focus();
}

// ── Schedule fetch + render ──
function loadSchedule(name){
  const scheduleEl = document.getElementById('schedule');
  scheduleEl.innerHTML = '<div class="state-msg"><div class="state-msg-icon">⏳</div><div class="state-msg-title">Loading your schedule...</div></div>';
  document.getElementById('search-card').style.display = 'none';

  fetch(SCRIPT_URL + '?action=getMySchedule&name=' + encodeURIComponent(name))
    .then(function(r){ return r.json(); })
    .then(function(body){
      if (!body || body.status !== 'ok' || !body.data) {
        renderError();
        return;
      }
      const data = body.data;
      // Release gate. The BCC owner hasn't flipped "Release Crew Assignments"
      // yet — show a lock screen instead of leaking assignments.
      if (data.released === false) {
        renderGated();
        return;
      }
      if (!data.matched) {
        renderNotFound(name);
        return;
      }
      try { localStorage.setItem(STORAGE_KEY, data.matched); } catch(e){}
      renderSchedule(data);
    })
    .catch(function(){
      renderError();
    });
}

function renderGated(){
  // Keep the welcome bar visible if we had a remembered name (so the ref
  // knows we recognized them); just swap the schedule area for the lock.
  document.getElementById('schedule').innerHTML =
    '<div class="state-msg">' +
      '<div class="state-msg-icon">🔒</div>' +
      '<div class="state-msg-title">Crew assignments not yet released</div>' +
      '<div>Your personal schedule will appear here the moment Karen or Jeff release crew assignments. Check back shortly before kickoff.</div>' +
    '</div>';
  // Don't pin a name to localStorage on a gated load; the matcher hasn't
  // actually run. If we have a remembered name, leave it; if not, show the
  // search card too so people can at least save their name for later.
  let stored = '';
  try { stored = localStorage.getItem(STORAGE_KEY) || ''; } catch(e){}
  if (!stored) {
    document.getElementById('search-card').style.display = '';
    document.getElementById('welcome-bar').style.display = 'none';
  }
}

function renderError(){
  document.getElementById('schedule').innerHTML =
    '<div class="state-msg"><div class="state-msg-icon">⚠️</div>' +
    '<div class="state-msg-title">Couldn\'t load schedule</div>' +
    '<div>Check your connection and try again.</div></div>';
  document.getElementById('search-card').style.display = '';
}

function renderNotFound(typed){
  document.getElementById('schedule').innerHTML =
    '<div class="state-msg"><div class="state-msg-icon">🤔</div>' +
    '<div class="state-msg-title">Couldn\'t find ' + escHtml(typed) + '</div>' +
    '<div>Try spelling your name as it appears on the roster, or pick from the suggestions.</div></div>';
  document.getElementById('search-card').style.display = '';
  input.focus();
}

function renderSchedule(data){
  const matched = data.matched;
  const games = data.games || [];

  // Welcome bar
  document.getElementById('welcome-bar').style.display = 'flex';
  document.getElementById('welcome-name').textContent = matched;
  const todayCount = games.filter(function(g){ return g.isToday; }).length;
  const sub = games.length === 0
    ? 'No games scheduled yet'
    : (todayCount > 0
        ? todayCount + ' game' + (todayCount === 1 ? '' : 's') + ' today · ' + games.length + ' total'
        : games.length + ' game' + (games.length === 1 ? '' : 's') + ' total');
  document.getElementById('welcome-sub').textContent = sub;

  if (!games.length) {
    document.getElementById('schedule').innerHTML =
      '<div class="state-msg"><div class="state-msg-icon">📅</div>' +
      '<div class="state-msg-title">No games assigned yet</div>' +
      '<div>Check back closer to the event.</div></div>';
    return;
  }

  // Group by date
  const byDay = {};
  const dayOrder = [];
  games.forEach(function(g){
    const key = g.dateSortable || 'unscheduled';
    if (!byDay[key]) {
      byDay[key] = { display: g.dateDisplay || 'Not yet scheduled', isToday: g.isToday, games: [] };
      dayOrder.push(key);
    }
    byDay[key].games.push(g);
  });

  let html = '';
  dayOrder.forEach(function(key, dayIdx){
    const day = byDay[key];
    const todayCls = day.isToday ? 'today' : '';
    const heading = day.isToday ? 'Today · ' + day.display : day.display;
    html += '<div class="day-section ' + todayCls + '">';
    html += '<div class="day-section-title">' + escHtml(heading) +
            ' <span class="count">· ' + day.games.length + ' game' + (day.games.length === 1 ? '' : 's') + '</span></div>';

    day.games.forEach(function(g, gIdx){
      const roleCls = 'role-' + g.myRole.toLowerCase().replace(/[^a-z0-9]/g, '');
      const cardId = 'game-' + dayIdx + '-' + gIdx;
      html += '<div class="game-card ' + (g.isToday ? 'today ' : '') + roleCls + '" id="' + cardId +
              '" onclick="toggleGameCard(\'' + cardId + '\')">' +
                '<div class="game-card-top">' +
                  '<div class="game-time">' + escHtml(g.time) + '</div>' +
                  '<div class="game-role-badge ' + roleCls + '">' + escHtml(g.myRole) + '</div>' +
                '</div>' +
                '<div class="game-meta">' +
                  'Field ' + escHtml(g.field) +
                  '<span class="dot">·</span>' +
                  escHtml(g.ageGroup + ' ' + g.gender).trim() +
                  (g.round ? '<span class="dot">·</span>' + escHtml(g.round) : '') +
                  '<span class="dot">·</span>' +
                  'Game #' + escHtml(g.gameNum) +
                '</div>' +
                '<div class="game-teams">' +
                  escHtml(g.homeTeam || '?') +
                  '<span class="vs">vs</span>' +
                  escHtml(g.awayTeam || '?') +
                '</div>' +
                '<div class="game-tap-hint">Tap to see crew →</div>' +
                buildCrewPanel(g) +
              '</div>';
    });

    html += '</div>';
  });
  document.getElementById('schedule').innerHTML = html;
}

function buildCrewPanel(g){
  let html = '<div class="crew-panel">';
  html += '<div class="crew-label">Crew</div>';
  if (!g.crew || !g.crew.length) {
    html += '<div class="crew-no-phone">No other crew assigned yet.</div>';
  } else {
    g.crew.forEach(function(m){
      const tel = m.phone ? m.phone.replace(/[^0-9]/g, '') : '';
      html += '<div class="crew-member">' +
                '<div class="crew-member-info">' +
                  '<div class="crew-member-name">' + escHtml(m.name) + '</div>' +
                  '<div class="crew-member-role">' + escHtml(m.role) + '</div>' +
                '</div>' +
                (tel ?
                  '<a class="crew-call" href="tel:' + escHtml(tel) + '" onclick="event.stopPropagation()">📞 Call</a>'
                  : '<div class="crew-no-phone">No number</div>') +
              '</div>';
    });
  }
  if (g.refCoach) {
    html += '<div class="refcoach-row">Ref Coach: <strong>' + escHtml(g.refCoach) + '</strong></div>';
  }
  html += '</div>';
  return html;
}

function toggleGameCard(id){
  const el = document.getElementById(id);
  if (el) el.classList.toggle('expanded');
}

// ── Boot ──
loadRosterNames();
let stored = '';
try { stored = localStorage.getItem(STORAGE_KEY) || ''; } catch(e){}
if (stored) {
  // Auto-load remembered ref
  loadSchedule(stored);
} else {
  input.focus();
}
</script>
